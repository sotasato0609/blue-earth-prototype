<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無料体験・見学のご予約｜総合スポーツクラブ BLUE EARTH</title>
<meta name="description" content="BLUE EARTHの無料体験・見学はWEBから24時間ご予約いただけます。ご希望の店舗・日時・サービスを選ぶだけ。">
<link rel="stylesheet" href="assets/css/be.css">
</head>
<body data-site="be" data-active="">
<div id="site-header"></div>

<main>
<section class="phero">
  <div class="phero-in">
    <div class="crumb"><a href="index.html">ホーム</a> ／ 無料体験・見学</div>
    <div class="en">FREE TRIAL & TOUR</div>
    <h1>無料体験・見学のご予約</h1>
    <p>気になる店舗の雰囲気を、まずは体感。フォームにご入力いただくだけで、24時間いつでもご予約いただけます。</p>
  </div>
</section>

<section class="block"><div class="wrap"><div class="formwrap">
  <div class="fcard">
    <form class="mock-form" data-thanks="thanks">
      <div class="field">
        <label>ご希望のサービス<span class="req">必須</span></label>
        <div class="chooser">
          <label><input type="radio" name="svc" checked>フィットネスジム</label>
          <label><input type="radio" name="svc">スタジオレッスン</label>
          <label><input type="radio" name="svc">プール・スイミング</label>
          <label><input type="radio" name="svc">温浴・スパ</label>
          <label><input type="radio" name="svc">キッズスクール</label>
          <label><input type="radio" name="svc">24時間ジム MY-BODY</label>
        </div>
      </div>
      <div class="field">
        <label>ご希望の店舗<span class="req">必須</span></label>
        <select required>
          <option value="">選択してください</option>
          <option>スポーツ・スパ店（山梨県・昭和町）</option><option>甲府店（山梨県）</option><option>敷島店（山梨県）</option><option>石和店（山梨県）</option><option>山梨店（山梨県）</option><option>南アルプス店（山梨県）</option><option>ブルーアース焼津店（静岡県）</option>
          <option>MY-BODY 潮見店（東京都）</option><option>MY-BODY 南橋本店（神奈川県）</option><option>MY-BODY 韮崎店（山梨県）</option><option>MY-BODY 前橋店（群馬県）</option><option>MY-BODY 佐久インターウェーブ店（長野県）</option><option>MY-BODY 牧之原店（静岡県）</option>
        </select>
      </div>
      <div class="frow">
        <div class="field"><label>ご希望日<span class="req">必須</span></label><input type="date" required></div>
        <div class="field"><label>ご希望時間帯</label>
          <select><option>午前（9:00–12:00）</option><option>午後（12:00–17:00）</option><option>夜（17:00–22:00）</option></select>
        </div>
      </div>
      <div class="frow">
        <div class="field"><label>お名前<span class="req">必須</span></label><input type="text" placeholder="山梨 太郎" required></div>
        <div class="field"><label>電話番号<span class="req">必須</span></label><input type="tel" placeholder="090-0000-0000" required></div>
      </div>
      <div class="field"><label>メールアドレス<span class="req">必須</span></label><input type="email" placeholder="example@mail.com" required></div>
      <div class="field"><label>ご質問・ご要望（任意）</label><textarea rows="3" placeholder="ご不明な点があればご記入ください"></textarea></div>
      <button class="btn btn-primary btn-lg" type="submit" style="width:100%">この内容で予約する</button>
      <p class="muted center" style="font-size:12.5px;margin-top:12px">※プロトタイプのため、実際の送信は行われません。</p>
    </form>
  </div>

  <div class="fcard hidden" id="thanks">
    <div class="thanks">
      <div class="chk">✓</div>
      <h2>ご予約ありがとうございます</h2>
      <p class="muted" style="margin-top:12px">ご入力いただいた内容で仮予約を承りました。<br>店舗より折り返しご連絡いたします（※サンプル動作）。</p>
      <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <a class="btn btn-primary" href="index.html">トップに戻る</a>
        <a class="btn btn-ghost" href="stores.html">他の店舗を見る</a>
      </div>
    </div>
  </div>
</div></div></section>
</main>

<div id="site-footer"></div>
<script src="assets/data/stores.js"></script>
<script src="assets/js/site.js"></script>
</body>
</html>
